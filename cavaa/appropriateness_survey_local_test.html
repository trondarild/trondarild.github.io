<!DOCTYPE html>
<!--
  LOCAL TEST VERSION of the COGEMI Social Appropriateness survey.
  Open this file directly in a browser — no server or Google account needed.

  Differences from the production version (appropriateness_survey.html):
  - google.script.run is mocked entirely in JavaScript
  - Responses are saved to localStorage (key: "cogemi_test_responses")
  - A "Download responses (CSV)" button appears on the completion page
  - A floating debug panel shows collected responses in real time

  To inspect collected data:
    localStorage.getItem("cogemi_test_responses")
  or click "Download responses (CSV)" at the end.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[LOCAL TEST] Social Appropriateness Study</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2rem;
      max-width: 640px;
      width: 100%;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.75rem; color: #444; }
    p  { line-height: 1.6; margin-bottom: 0.75rem; color: #333; }
    .test-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      color: #856404;
    }
    .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: #4a90d9; border-radius: 3px; transition: width 0.3s ease; }
    .scenario-text {
      font-size: 1.05rem;
      line-height: 1.65;
      background: #f9f9f9;
      border-left: 4px solid #4a90d9;
      padding: 1rem 1.25rem;
      border-radius: 0 6px 6px 0;
      margin-bottom: 1.5rem;
    }
    .question { font-weight: 600; margin-bottom: 1rem; }
    .response-buttons { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .response-btn {
      flex: 1; min-width: 120px;
      padding: 0.75rem 1rem;
      border: 2px solid #ccc; border-radius: 8px;
      background: #fff; font-size: 0.95rem; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .response-btn:hover { border-color: #4a90d9; background: #eaf2fb; }
    .response-btn.selected { border-color: #4a90d9; background: #4a90d9; color: #fff; }
    .btn-primary {
      display: block; width: 100%;
      padding: 0.85rem; background: #4a90d9; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      margin-top: 1.5rem; transition: background 0.15s;
    }
    .btn-primary:hover   { background: #3578c0; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-secondary {
      display: block; width: 100%;
      padding: 0.75rem; background: #fff; color: #4a90d9;
      border: 2px solid #4a90d9; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      margin-top: 0.75rem; transition: background 0.15s;
    }
    .btn-secondary:hover { background: #eaf2fb; }
    label { display: block; margin-bottom: 0.4rem; font-weight: 500; }
    input, select {
      width: 100%; padding: 0.55rem 0.75rem;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 0.95rem; margin-bottom: 1rem;
    }
    .field-row { display: flex; gap: 1rem; }
    .field-row > div { flex: 1; }
    .hidden { display: none; }
    .small  { font-size: 0.85rem; color: #666; }
    .error  { color: #c0392b; font-size: 0.9rem; margin-top: 0.5rem; }

    /* Debug panel */
    #debug-panel {
      position: fixed; bottom: 1rem; right: 1rem;
      width: 320px; max-height: 260px;
      background: #1e1e1e; color: #9cdcfe;
      border-radius: 8px; padding: 0.75rem;
      font-family: monospace; font-size: 0.78rem;
      overflow-y: auto; z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #debug-panel h3 { color: #569cd6; margin-bottom: 0.5rem; font-size: 0.82rem; }
    #debug-log div  { border-bottom: 1px solid #333; padding: 0.2rem 0; }
    .attn-pass  { color: #4ec9b0; }
    .attn-fail  { color: #f44747; }
  </style>
</head>
<body>
<div class="card">

  <!-- ===== CONSENT PAGE ===== -->
  <div id="page-consent">
    <div class="test-banner">⚠ LOCAL TEST MODE — responses saved to localStorage, not Google Sheets</div>
    <h1 id="ui-consent-title"></h1>
    <p id="ui-consent-p1"></p>
    <p id="ui-consent-p2"></p>
    <p id="ui-consent-p3"></p>
    <p class="small" id="ui-consent-p4"></p>
    <div style="margin-top:1.25rem">
      <label><input type="checkbox" id="consent-check" style="width:auto;margin-right:0.5rem">
        <span id="ui-consent-label"></span></label>
    </div>
    <div style="margin-top:1rem">
      <label for="lang-select" id="ui-lang-label"></label>
      <select id="lang-select" onchange="translateUI(this.value)">
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>
    <button class="btn-primary" id="ui-btn-consent" onclick="startDemographics()"></button>
    <div class="error" id="err-consent"></div>
  </div>

  <!-- ===== DEMOGRAPHICS PAGE ===== -->
  <div id="page-demographics" class="hidden">
    <h1 id="ui-demo-title"></h1>
    <p class="small" style="margin-bottom:1rem" id="ui-demo-subtitle"></p>
    <label for="prolific-id" id="ui-label-prolific"></label>
    <input type="text" id="prolific-id" placeholder="e.g. test_participant_01" value="test_participant_01">
    <div class="field-row">
      <div>
        <label for="age" id="ui-label-age"></label>
        <input type="number" id="age" min="18" max="99" placeholder="e.g. 34" value="30">
      </div>
      <div>
        <label for="gender" id="ui-label-gender"></label>
        <select id="gender">
          <option value="" id="ui-gender-select"></option>
          <option value="Woman"    id="ui-gender-woman"></option>
          <option value="Man"      id="ui-gender-man"></option>
          <option value="Nonbinary" id="ui-gender-nonbinary"></option>
          <option value="Prefer"   id="ui-gender-prefer"></option>
        </select>
      </div>
    </div>
    <label for="country" id="ui-label-country"></label>
    <input type="text" id="country" placeholder="e.g. Norway" value="Norway">
    <label for="first-language" id="ui-label-firstlang"></label>
    <input type="text" id="first-language" placeholder="e.g. Norwegian" value="Norwegian">
    <button class="btn-primary" id="ui-btn-start" onclick="startSurvey()"></button>
    <div class="error" id="err-demo"></div>
  </div>

  <!-- ===== SURVEY PAGE ===== -->
  <div id="page-survey" class="hidden">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <h2 id="scenario-counter"></h2>
    <div class="scenario-text" id="scenario-text">Loading…</div>
    <p class="question" id="question-text"></p>
    <div class="response-buttons" id="response-buttons"></div>
    <button class="btn-primary" id="btn-next" disabled onclick="nextScenario()"></button>
    <div class="error" id="err-survey"></div>
  </div>

  <!-- ===== COMPLETION PAGE ===== -->
  <div id="page-done" class="hidden">
    <h1 id="ui-done-title"></h1>
    <p id="ui-done-p1">— <span id="done-count"></span> —</p>
    <p id="ui-done-p2"></p>
    <p class="small" id="ui-done-p3"></p>
    <button class="btn-secondary" id="ui-btn-download" onclick="downloadCSV()"></button>
    <button class="btn-secondary" id="ui-btn-restart" onclick="clearAndRestart()" style="margin-top:0.5rem"></button>
  </div>

</div>

<!-- Debug panel -->
<div id="debug-panel">
  <h3>Debug — responses so far</h3>
  <div id="debug-log"></div>
</div>

// =============================================================================
// Mock google.script.run
// This replaces the GAS RPC layer with synchronous local equivalents.
// =============================================================================
var google = {
  script: {
    run: {
      _successHandler: null,
      _failureHandler: null,
      withSuccessHandler: function(fn) { this._successHandler = fn; return this; },
      withFailureHandler: function(fn) { this._failureHandler = fn; return this; },
      getScenariosForSession: function(lang) {
        var self = this;
        setTimeout(function() {
          self._successHandler && self._successHandler(mockGetScenariosForSession(lang));
        }, 50);
      },
      getResponseLabels: function(lang) {
        var self = this;
        setTimeout(function() {
          self._successHandler && self._successHandler(mockGetResponseLabels(lang));
        }, 50);
      },
      submitResponse: function(prolificId, scenarioId, response, age, gender, country, language) {
        var self = this;
        setTimeout(function() {
          mockSubmitResponse(prolificId, scenarioId, response, age, gender, country, language);
          self._successHandler && self._successHandler({ ok: true });
        }, 30);
      }
    }
  }
};

    ["ui-gender-nonbinary", "gender-nonbinary", "textContent"],
    ["ui-gender-prefer",    "gender-prefer",    "textContent"],
    ["ui-label-country",    "label-country",    "textContent"],
    ["ui-label-firstlang",  "label-firstlang",  "textContent"],
    ["ui-btn-start",        "btn-start",        "textContent"],
    ["btn-next",            "btn-next",         "textContent"],
    ["ui-done-title",       "done-title",       "textContent"],
    ["ui-done-p2",          "done-p2",          "innerHTML"],
    ["ui-done-p3",          "done-p3",          "innerHTML"],
    ["ui-btn-download",     "btn-download",     "textContent"],
    ["ui-btn-restart",      "btn-restart",      "textContent"]
  ];
  ids.forEach(function(row) {
    var el = document.getElementById(row[0]);
    if (el) el[row[2]] = t[row[1]];
  });
  // "done-p1" has a <span> inside — update surrounding text only
  var p1 = document.getElementById("ui-done-p1");
  if (p1) {
    var count = document.getElementById("done-count");
    var n = count ? count.textContent : "";
    p1.innerHTML = t["done-p1-pre"] + ' <span id="done-count">' + n + '</span> ' + t["done-p1-post"];
  }
}

// Initialise with English on page load
translateUI("en");

var RESPONSE_LABELS = {
  en: ["Inappropriate", "Neutral", "Appropriate"],
  fr: ["Inapproprié",   "Neutre",  "Approprié"]
};
var RESPONSE_VALUES = ["Inappropriate", "Neutral", "Appropriate"];

function mockGetResponseLabels(lang) {
  var labels = RESPONSE_LABELS[lang] || RESPONSE_LABELS.en;
  return RESPONSE_VALUES.map(function(v, i) { return { value: v, label: labels[i] }; });
}

function mockGetScenariosForSession(lang) {
  var pool = SCENARIOS.slice();
  // Fisher-Yates shuffle
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  pool.splice(7,  0, ATTENTION_CHECKS[0]);
  pool.splice(17, 0, ATTENTION_CHECKS[1]);
  return pool.map(function(s) {
    return { id: s.id, text: lang === "fr" ? s.fr : s.en, expected: s.expected || null };
  });
}

function mockSubmitResponse(prolificId, scenarioId, response, age, gender, country, language) {
  var stored = JSON.parse(localStorage.getItem("cogemi_test_responses") || "[]");
  stored.push({
    timestamp:   new Date().toISOString(),
    prolific_id: prolificId,
    scenario_id: scenarioId,
    response:    response,
    age:         age,
    gender:      gender,
    country:     country,
    language:    language
  });
  localStorage.setItem("cogemi_test_responses", JSON.stringify(stored));
  debugLog(scenarioId, response);
}

// =============================================================================
// Survey state & logic (identical to production)
// =============================================================================
var state = {
  lang: "en", prolificId: "", age: "", gender: "", country: "", firstLang: "",
  scenarios: [], current: 0, selected: null, labels: []
};

var QUESTIONS = {
  en: "How socially appropriate is the action described?",
  fr: "Dans quelle mesure l'action décrite est-elle socialement appropriée ?"
};

function show(id) {
  ["page-consent","page-demographics","page-survey","page-done"].forEach(function(p) {
    document.getElementById(p).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

var ERR_CONSENT = { en: "Please tick the consent box to continue.", fr: "Veuillez cocher la case de consentement pour continuer." };
var ERR_DEMO    = { en: "Please fill in all fields.", fr: "Veuillez remplir tous les champs." };
var SITUATION   = { en: ["Situation", "of"], fr: ["Situation", "sur"] };

function startDemographics() {
  state.lang = document.getElementById("lang-select").value;
  if (!document.getElementById("consent-check").checked) {
    document.getElementById("err-consent").textContent = ERR_CONSENT[state.lang] || ERR_CONSENT.en;
    return;
  }
  translateUI(state.lang);
  show("page-demographics");
}

function startSurvey() {
  var pid = document.getElementById("prolific-id").value.trim();
  var age = document.getElementById("age").value.trim();
  var gen = document.getElementById("gender").value;
  var cty = document.getElementById("country").value.trim();
  var fl  = document.getElementById("first-language").value.trim();
  if (!pid || !age || !gen || !cty || !fl) {
    document.getElementById("err-demo").textContent = ERR_DEMO[state.lang] || ERR_DEMO.en;
    return;
  }
  state.prolificId = pid; state.age = age; state.gender = gen;
  state.country = cty;    state.firstLang = fl;

  google.script.run
    .withSuccessHandler(function(scenarios) {
      state.scenarios = scenarios;
      google.script.run
        .withSuccessHandler(function(labels) {
          state.labels = labels;
          show("page-survey");
          renderScenario();
        })
        .getResponseLabels(state.lang);
    })
    .getScenariosForSession(state.lang);
}

function renderScenario() {
  var s     = state.scenarios[state.current];
  var total = state.scenarios.length;
  var sit = SITUATION[state.lang] || SITUATION.en;
  document.getElementById("scenario-counter").textContent =
    sit[0] + " " + (state.current + 1) + " " + sit[1] + " " + total;
  document.getElementById("scenario-text").textContent = s.text;
  document.getElementById("question-text").textContent = QUESTIONS[state.lang] || QUESTIONS.en;
  var pct = Math.round((state.current / total) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";

  var container = document.getElementById("response-buttons");
  container.innerHTML = "";
  state.labels.forEach(function(item) {
    var btn = document.createElement("button");
    btn.className = "response-btn";
    btn.textContent = item.label;
    btn.onclick = function() { selectResponse(item.value, btn); };
    container.appendChild(btn);
  });
  state.selected = null;
  document.getElementById("btn-next").disabled = true;
  document.getElementById("err-survey").textContent = "";
}

function selectResponse(value, btn) {
  document.querySelectorAll(".response-btn").forEach(function(b) { b.classList.remove("selected"); });
  btn.classList.add("selected");
  state.selected = value;
  document.getElementById("btn-next").disabled = false;
}

function nextScenario() {
  if (!state.selected) return;
  var scenarioId = state.scenarios[state.current].id;
  document.getElementById("btn-next").disabled = true;

  google.script.run
    .withSuccessHandler(function(result) {
      if (!result.ok) {
        document.getElementById("err-survey").textContent = "Save error — try again.";
        document.getElementById("btn-next").disabled = false;
        return;
      }
      state.current++;
      if (state.current >= state.scenarios.length) {
        document.getElementById("done-count").textContent = state.scenarios.length;
        show("page-done");
        document.getElementById("debug-panel").style.display = "none";
      } else {
        renderScenario();
      }
    })
    .submitResponse(
      state.prolificId, scenarioId, state.selected,
      state.age, state.gender, state.country, state.firstLang
    );
}

// =============================================================================
// Debug panel
// =============================================================================

function debugLog(scenarioId, response) {
  var stored = JSON.parse(localStorage.getItem("cogemi_test_responses") || "[]");
  var log    = document.getElementById("debug-log");
  var entry  = document.createElement("div");

  // Check attention check correctness
  var attn = ATTENTION_CHECKS.find(function(a) { return a.id === scenarioId; });
  var label = "";
  if (attn) {
    var pass = response === attn.expected;
    label = pass
      ? '<span class="attn-pass"> ✓ attn pass</span>'
      : '<span class="attn-fail"> ✗ attn FAIL (expected: ' + attn.expected + ')</span>';
  }

  entry.innerHTML = "<strong>" + stored.length + ".</strong> " +
    scenarioId.replace("sa_", "") + " → " + response + label;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// =============================================================================
// CSV download
// =============================================================================

function downloadCSV() {
  var data = JSON.parse(localStorage.getItem("cogemi_test_responses") || "[]");
  if (!data.length) { alert("No responses found."); return; }

  var header = ["timestamp","prolific_id","scenario_id","response","age","gender","country","language"];
  var rows   = data.map(function(r) {
    return header.map(function(k) { return '"' + (r[k] || "") + '"'; }).join(",");
  });
  var csv  = header.join(",") + "\n" + rows.join("\n");
  var blob = new Blob([csv], { type: "text/csv" });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href  = url; a.download = "cogemi_test_responses.csv"; a.click();
  URL.revokeObjectURL(url);
}

function clearAndRestart() {
  localStorage.removeItem("cogemi_test_responses");
  location.reload();
}
</script>
